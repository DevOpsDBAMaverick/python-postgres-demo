name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml','**/uv.lock') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Upgrade pip and install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install project and dev dependencies
        run: |
          # Install package and dev extras declared in pyproject
          pip install -e .[dev]

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break || sleep 1
          done

      - name: Validate PostgreSQL connectivity
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          python - <<'PY'
          import os
          import sys
          from psycopg import connect, OperationalError

          dsn = (
              f"host={os.environ['PGHOST']} port={os.environ['PGPORT']} "
              f"dbname={os.environ['PGDATABASE']} user={os.environ['PGUSER']} "
              f"password={os.environ['PGPASSWORD']} sslmode=disable connect_timeout=5"
          )
          try:
              with connect(dsn) as conn:
                  with conn.cursor() as cur:
                      cur.execute('select 1')
                      print('postgres OK')
          except OperationalError as e:
              print('postgres connection failed:', e)
              sys.exit(2)
          PY

      - name: Run ruff (lint)
        run: |
          ruff check src tests

      - name: Run tests (pytest)
        run: |
          pytest -q
